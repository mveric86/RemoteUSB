# =============================================================================
# RemoteUSB – Standardkonfiguration
# =============================================================================

# Access Point
AP_SSID="RemoteUSB"
AP_PASSWORD="remoteusb"        # Bitte ändern!
AP_IP="192.168.4.1"
AP_DHCP_START="192.168.4.10"
AP_DHCP_END="192.168.4.50"

# GPIO-Pinbelegung
GPIO_AP_BUTTON=4
GPIO_SHUTDOWN_BUTTON=27
GPIO_LED_RED=25
GPIO_LED_GREEN=24
GPIO_LED_BLUE=23

# Taster-Haltezeit in Sekunden
BUTTON_HOLD_TIME=2

# Watchdog
WG_PING_TARGET="10.0.0.1"     # IP des WireGuard-Servers (Heimnetz)
WG_TIMEOUT=30                  # Sekunden bis AP-Modus bei WireGuard-Ausfall
